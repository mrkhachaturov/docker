http:
  routers:
    jellyfin-rtr:
      rule: "Host(`tube.{{env "DOMAINNAME_HL"}}`)" 
      entryPoints:
        - websecure
      middlewares:
        - chain-no-auth
      service: jellyfin-svc
      tls:
        certResolver: zerossl
        
  services:
    jellyfin-svc:
      loadBalancer:
        passHostHeader: true
        serversTransport: jellyfin      
        servers:
          - url: "http://10.2.120.10:8096"
  
  serversTransports:
    jellyfin:
      insecureSkipVerify: true
