# Harbor compose bundle for ivn-nas1
#
# Run mode: docker compose (no installer script on target)
#
# Important:
# - This compose expects generated Harbor configs under ${DOCKERDIR}/appdata/harbor/common/config.
# - Copy those files from this host together with this compose file.
# - Storage is local bind mount via ${DOCKERDIR}/appdata/harbor/data (filesystem backend).
# - If your copied config still points to S3/external DB, adjust files under ${DOCKERDIR}/appdata/harbor/common/config before start.

services:
  log:
    image: goharbor/harbor-log:v2.14.2
    container_name: harbor-log
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - ${DOCKERDIR}/appdata/harbor/logs/:/var/log/docker/
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/common/config/log/logrotate.conf
        target: /etc/logrotate.d/logrotate.conf
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/common/config/log/rsyslog_docker.conf
        target: /etc/rsyslog.d/rsyslog_docker.conf
    ports:
      - 127.0.0.1:1514:10514
    networks:
      - harbor
  registry:
    image: goharbor/registry-photon:v2.14.2
    container_name: registry
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ${DOCKERDIR}/appdata/harbor/data/registry:/storage
      - ${DOCKERDIR}/appdata/harbor/common/config/registry/:/etc/registry/
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/data/secret/registry/root.crt
        target: /etc/registry/root.crt
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/common/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "registry"
  registryctl:
    image: goharbor/harbor-registryctl:v2.14.2
    container_name: registryctl
    env_file:
      - ${DOCKERDIR}/appdata/harbor/common/config/registryctl/env
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ${DOCKERDIR}/appdata/harbor/data/registry:/storage
      - ${DOCKERDIR}/appdata/harbor/common/config/registry/:/etc/registry/
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/common/config/registryctl/config.yml
        target: /etc/registryctl/config.yml
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/common/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "registryctl"
  core:
    image: goharbor/harbor-core:v2.14.2
    container_name: harbor-core
    env_file:
      - ${DOCKERDIR}/appdata/harbor/common/config/core/env
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    volumes:
      - ${DOCKERDIR}/appdata/harbor/data/ca_download/:/etc/core/ca/
      - ${DOCKERDIR}/appdata/harbor/data/:/data/
      - ${DOCKERDIR}/appdata/harbor/common/config/core/certificates/:/etc/core/certificates/
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/common/config/core/app.conf
        target: /etc/core/app.conf
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/data/secret/core/private_key.pem
        target: /etc/core/private_key.pem
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/data/secret/keys/secretkey
        target: /etc/core/key
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/common/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      harbor:
    depends_on:
      - log
      - registry
      - redis
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "core"
  portal:
    image: goharbor/harbor-portal:v2.14.2
    container_name: harbor-portal
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/common/config/portal/nginx.conf
        target: /etc/nginx/nginx.conf
    networks:
      - harbor
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "portal"

  jobservice:
    image: goharbor/harbor-jobservice:v2.14.2
    container_name: harbor-jobservice
    env_file:
      - ${DOCKERDIR}/appdata/harbor/common/config/jobservice/env
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ${DOCKERDIR}/appdata/harbor/data/job_logs:/var/log/jobs
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/common/config/jobservice/config.yml
        target: /etc/jobservice/config.yml
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/common/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    depends_on:
      - core
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "jobservice"
  redis:
    image: goharbor/redis-photon:v2.14.2
    container_name: redis
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ${DOCKERDIR}/appdata/harbor/data/redis:/var/lib/redis
    networks:
      harbor:
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "redis"
  proxy:
    image: goharbor/nginx-photon:v2.14.2
    container_name: nginx
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - ${DOCKERDIR}/appdata/harbor/common/config/nginx:/etc/nginx
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/common/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    ports:
      - 18080:8080
    depends_on:
      - registry
      - core
      - portal
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "proxy"
  trivy-adapter:
    container_name: trivy-adapter
    image: goharbor/trivy-adapter-photon:v2.14.2
    restart: always
    cap_drop:
      - ALL
    depends_on:
      - log
      - redis
    networks:
      - harbor
    volumes:
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/data/trivy-adapter/trivy
        target: /home/scanner/.cache/trivy
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/data/trivy-adapter/reports
        target: /home/scanner/.cache/reports
      - type: bind
        source: ${DOCKERDIR}/appdata/harbor/common/config/shared/trust-certificates
        target: /harbor_cust_cert
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "trivy-adapter"
    env_file:
      ${DOCKERDIR}/appdata/harbor/common/config/trivy-adapter/env
networks:
  harbor:
    external: false
